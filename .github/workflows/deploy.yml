name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skip_posting:
        description: 'Skip posting to X (useful for initial deployment)'
        required: false
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
      dry_run:
        description: 'Dry run (log what would be posted without posting)'
        required: false
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
      log_level:
        description: 'Logging level'
        required: false
        default: 'INFO'
        type: choice
        options:
        - 'DEBUG'
        - 'INFO'
        - 'WARNING'
        - 'ERROR'

env:
  AWS_REGION: ap-northeast-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write  # Required for AWS OIDC
      contents: read
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libyaml-dev python3-dev build-essential

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('consumer/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel cython
        pip install --prefer-binary --no-cache-dir -r consumer/requirements.txt
        pip install aws-sam-cli

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        role-session-name: GitHubActions-SAMDeploy
        aws-region: ${{ env.AWS_REGION }}

    - name: Verify AWS credentials and debug info
      run: |
        echo "🔍 AWS Debug Information:"
        echo "  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}"
        echo "  AWS_REGION: ${{ env.AWS_REGION }}"
        echo "  GitHub Repository: ${{ github.repository }}"
        echo "  GitHub Ref: ${{ github.ref }}"
        echo "  GitHub Event: ${{ github.event_name }}"
        
        # Verify AWS credentials
        aws sts get-caller-identity
        
        # Check IAM role details
        ROLE_NAME=$(echo "${{ secrets.AWS_ROLE_ARN }}" | cut -d'/' -f2)
        echo "  Role Name: $ROLE_NAME"
        
        # List attached policies
        aws iam list-attached-role-policies --role-name "$ROLE_NAME" || echo "Could not list policies"

    - name: Update X API credentials in Parameter Store
      run: |
        # Update X API credentials
        aws ssm put-parameter \
          --name "/yamanashi-event-stream-x/x-api-key" \
          --value "${{ secrets.X_API_KEY }}" \
          --type "SecureString" \
          --overwrite
        
        aws ssm put-parameter \
          --name "/yamanashi-event-stream-x/x-api-secret" \
          --value "${{ secrets.X_API_SECRET }}" \
          --type "SecureString" \
          --overwrite
        
        aws ssm put-parameter \
          --name "/yamanashi-event-stream-x/x-access-token" \
          --value "${{ secrets.X_ACCESS_TOKEN }}" \
          --type "SecureString" \
          --overwrite
        
        aws ssm put-parameter \
          --name "/yamanashi-event-stream-x/x-access-token-secret" \
          --value "${{ secrets.X_ACCESS_TOKEN_SECRET }}" \
          --type "SecureString" \
          --overwrite

    - name: SAM build
      run: |
        sam build --template template.yaml

    - name: SAM deploy
      run: |
        # Set deployment parameters based on trigger and inputs
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          SKIP_POSTING="${{ github.event.inputs.skip_posting }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          LOG_LEVEL="${{ github.event.inputs.log_level }}"
        else
          # For automatic push deployment, use safe defaults
          SKIP_POSTING="true"  # Skip posting on automatic deployments to avoid spam
          DRY_RUN="false"
          LOG_LEVEL="INFO"
        fi
        
        echo "🚀 Deploying with parameters:"
        echo "  - SkipPosting: $SKIP_POSTING"
        echo "  - DryRun: $DRY_RUN"
        echo "  - LogLevel: $LOG_LEVEL"
        
        sam deploy \
          --template-file .aws-sam/build/template.yaml \
          --stack-name yamanashi-event-stream-x \
          --parameter-overrides \
            TableName=posted_events \
            LogLevel=$LOG_LEVEL \
            SkipPosting=$SKIP_POSTING \
            DryRun=$DRY_RUN \
          --capabilities CAPABILITY_IAM \
          --region ${{ env.AWS_REGION }} \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --resolve-s3

    - name: Get deployment outputs
      run: |
        # Get stack outputs
        aws cloudformation describe-stacks \
          --stack-name yamanashi-event-stream-x \
          --region ${{ env.AWS_REGION }} \
          --query 'Stacks[0].Outputs' \
          --output table

    - name: Deployment summary
      run: |
        # Set parameters for summary
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          SKIP_POSTING="${{ github.event.inputs.skip_posting }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}" 
          LOG_LEVEL="${{ github.event.inputs.log_level }}"
          TRIGGER="Manual (workflow_dispatch)"
        else
          SKIP_POSTING="true"
          DRY_RUN="false"
          LOG_LEVEL="INFO"
          TRIGGER="Automatic (push to main)"
        fi
        
        echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Stack Name**: yamanashi-event-stream-x" >> $GITHUB_STEP_SUMMARY
        echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Trigger**: $TRIGGER" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Skip Posting**: $SKIP_POSTING" >> $GITHUB_STEP_SUMMARY
        echo "- **Dry Run**: $DRY_RUN" >> $GITHUB_STEP_SUMMARY
        echo "- **Log Level**: $LOG_LEVEL" >> $GITHUB_STEP_SUMMARY
        
        if [ "$SKIP_POSTING" = "true" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note**: Posting to X is disabled. To enable posting:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Run 'Deploy to AWS' workflow manually" >> $GITHUB_STEP_SUMMARY
          echo "3. Set 'Skip posting to X' to 'false'" >> $GITHUB_STEP_SUMMARY
        fi